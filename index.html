<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind-Wave Academy | Authority Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-purple: #582C83; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfbff; min-height: 100vh; color: #1a1a1a; }
        .glass-panel { background: white; border: 1px solid #e2d9f3; box-shadow: 0 10px 30px rgba(88, 44, 131, 0.05); }
        .brand-gradient { background: linear-gradient(135deg, var(--brand-purple) 0%, #3b0a7d 100%); }
        .btn-purple { background: var(--brand-purple); color: white; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .btn-purple:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .form-input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #e2d9f3; outline: none; font-size: 13px; font-weight: 600; }
        
        /* MIND LOGO SPINNER */
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.92); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .mind-logo-spin { width: 60px; height: 60px; border: 6px solid #f3f3f3; border-top: 6px solid var(--brand-purple); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* EXCEL STYLE TABLE */
        .excel-table { width: 100%; border-collapse: collapse; font-size: 13px; background: white; }
        .excel-table th { background: #f8f6ff; color: #582C83; padding: 12px; border: 1px solid #e2d9f3; text-align: left; text-transform: uppercase; font-size: 11px; font-weight: 800; }
        .excel-table td { padding: 12px; border: 1px solid #e2d9f3; }
        .row-hover:hover { background-color: #fcfaff; cursor: pointer; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="pb-20">

    <div id="loader">
        <div class="mind-logo-spin"></div>
        <p class="mt-4 font-black text-purple-900 text-xs tracking-widest uppercase">Mind-Wave Syncing...</p>
    </div>

    <nav class="brand-gradient text-white p-6 flex flex-col items-center mb-8 shadow-xl no-print">
        <h1 class="text-2xl font-black uppercase italic tracking-tighter">Mind-Wave Academy</h1>
        <p class="text-[10px] tracking-[3px] opacity-80 uppercase">Authority Control System</p>
    </nav>

    <div class="container mx-auto px-4 max-w-6xl no-print">
        <div class="flex flex-wrap justify-between items-center mb-8 gap-4">
            <div class="glass-panel p-1.5 rounded-2xl flex gap-1 shadow-sm">
                <button onclick="switchTab('student')" class="px-6 py-2 rounded-xl font-bold text-xs">Student Portal</button>
                <button onclick="loginAs('teacher')" class="px-6 py-2 rounded-xl font-bold text-xs">Teacher Login</button>
                <button onclick="loginAs('admin')" class="px-6 py-2 btn-purple rounded-xl font-bold text-xs shadow-lg">Super Admin</button>
            </div>
            <button onclick="pullAll()" class="bg-emerald-500 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase hover:bg-emerald-600 transition shadow-md">Upgrade (Refresh Cloud Data)</button>
        </div>

        <div id="admin-view" class="hidden">
            <div class="glass-panel p-8 rounded-[2.5rem] border-b-[8px] border-purple-900 shadow-2xl">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black text-purple-900 uppercase">Super Admin Hub</h2>
                    <button onclick="logout()" class="text-red-500 text-xs font-bold uppercase tracking-widest">Logout</button>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-8">
                    <button onclick="renderTask('enroll')" class="p-4 bg-white border-2 rounded-2xl font-black text-[9px] uppercase hover:border-purple-900 transition">Enroll Student</button>
                    <button onclick="renderTask('teacher')" class="p-4 bg-white border-2 rounded-2xl font-black text-[9px] uppercase hover:border-purple-900 transition">Add Teacher</button>
                    <button onclick="renderTask('subjects')" class="p-4 bg-purple-900 text-white rounded-2xl font-black text-[9px] uppercase shadow-lg">Subjects List</button>
                    <button onclick="renderTask('directory')" class="p-4 bg-purple-50 rounded-2xl font-black text-[9px] uppercase text-purple-900">Student Reg</button>
                    <button onclick="renderTask('teacher-reg')" class="p-4 bg-purple-50 rounded-2xl font-black text-[9px] uppercase text-purple-900">Teacher Reg</button>
                    <button onclick="renderTask('manage-results')" class="p-4 bg-purple-100 rounded-2xl font-black text-[9px] uppercase text-purple-900 border border-purple-200">Manage Results</button>
                </div>
                <div id="task-display-area" class="p-6 bg-white rounded-3xl border border-purple-100 min-h-[400px]"></div>
            </div>
        </div>

        <div id="teacher-view" class="hidden">
            <div class="grid lg:grid-cols-4 gap-6">
                <div class="lg:col-span-1 space-y-4">
                    <div class="glass-panel p-6 rounded-[2rem] border-t-4 border-purple-900">
                        <h2 class="text-sm font-black text-purple-900 mb-4 uppercase">Selection</h2>
                        <div class="space-y-3">
                            <select id="teacher-matrix" onchange="loadBulkList()" class="form-input"></select>
                            <input type="date" id="test-date" onchange="loadBulkList()" class="form-input">
                            <input type="number" id="marks-tot" value="100" class="form-input" placeholder="Total Marks">
                        </div>
                    </div>
                    <button id="save-btn" onclick="commitBulkResults()" class="w-full btn-purple py-4 rounded-xl text-xs shadow-lg uppercase tracking-widest">Save & Upload</button>
                    <p class="text-[9px] text-center text-gray-400 font-bold px-4">Cloud will not sync until you press Save.</p>
                </div>
                <div class="lg:col-span-3">
                    <div class="glass-panel p-8 rounded-[2.5rem]">
                        <table class="excel-table">
                            <thead><tr><th>Roll No</th><th>Student Name</th><th class="w-32">Marks Obtained</th></tr></thead>
                            <tbody id="bulk-student-body"></tbody>
                        </table>
                        <div id="bulk-empty-msg" class="py-20 text-center text-gray-400 font-bold italic">Select Class & Date to view list</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="student-view" class="max-w-xl mx-auto">
            <div class="glass-panel p-10 rounded-[3rem] border-t-[12px] border-purple-900">
                <h2 class="text-3xl font-black text-center text-purple-900 mb-8 uppercase">Result Search</h2>
                <div class="space-y-4">
                    <input type="text" id="query-roll" placeholder="Roll Number" class="form-input text-center text-lg py-4">
                    <select id="query-class" class="form-input text-center"><option>9th</option><option>10th</option><option>11th</option><option>12th</option></select>
                    <button onclick="getStudentResults()" class="w-full btn-purple py-5 rounded-2xl text-xl shadow-lg uppercase">Generate Marksheet</button>
                </div>
                <div id="result-timeline" class="mt-8"></div>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://mind-wave-portal-default-rtdb.firebaseio.com/"; 
        let db_students = [], db_teachers = [], db_results = [], db_subjects = [];
        let sessionUser = null;
        let isDataModified = false;

        // SHOW SPINNER
        function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }

        // ALERT IF LEAVING WITHOUT SAVING
        window.onbeforeunload = function() { if(isDataModified) return "Unsaved marks will be lost!"; };

        async function cloudSync(path, data = null, method = 'GET') {
            const url = `${FIREBASE_URL}/${path}.json`;
            try {
                const options = method === 'PUT' ? { method: 'PUT', body: JSON.stringify(data) } : {};
                const res = await fetch(url, options);
                return method === 'GET' ? (await res.json() || []) : true;
            } catch (e) { return []; }
        }

        async function pullAll() {
            showLoader(true);
            db_students = await cloudSync('mw_students') || [];
            db_teachers = await cloudSync('mw_teachers') || [];
            db_results = await cloudSync('mw_results') || [];
            db_subjects = await cloudSync('mw_subjects') || [];
            if(db_subjects.length === 0) db_subjects = ["Physics", "Chemistry", "Math", "English"];
            refreshUI();
            showLoader(false);
        }

        async function saveAll() {
            showLoader(true);
            await cloudSync('mw_students', db_students, 'PUT');
            await cloudSync('mw_teachers', db_teachers, 'PUT');
            await cloudSync('mw_results', db_results, 'PUT');
            await cloudSync('mw_subjects', db_subjects, 'PUT');
            isDataModified = false;
            showLoader(false);
        }

        function switchTab(t) { 
            if(isDataModified && !confirm("Discard unsaved changes?")) return;
            sessionUser = null; 
            isDataModified = false;
            refreshUI(); 
        }

        function loginAs(role) {
            if(role === 'admin') {
                if(prompt("Admin Key:") === "admin123") { sessionUser = {type:'admin'}; refreshUI(); }
            } else {
                const n = prompt("Name:"), p = prompt("Pass:");
                const user = db_teachers.find(t => t.name === n && t.pass === p);
                if(user) { sessionUser = {type:'teacher', ...user}; refreshUI(); }
                else alert("Invalid Credentials");
            }
        }

        function refreshUI() {
            document.querySelectorAll('#admin-view, #teacher-view, #student-view').forEach(v => v.classList.add('hidden'));
            if(sessionUser?.type === 'admin') document.getElementById('admin-view').classList.remove('hidden');
            else if(sessionUser?.type === 'teacher') {
                document.getElementById('teacher-view').classList.remove('hidden');
                document.getElementById('teacher-matrix').innerHTML = sessionUser.auth.map(a => `<option value="${a.class}|${a.subject}">${a.class} - ${a.subject}</option>`).join('');
            } else document.getElementById('student-view').classList.remove('hidden');
        }

        // CSV EXPORTER
        function downloadCSV() {
            const date = document.getElementById('filter-date').value;
            const sub = document.getElementById('filter-sub').value;
            let filtered = db_results;
            if(date) filtered = filtered.filter(r => r.date === date);
            if(sub) filtered = filtered.filter(r => r.subject === sub);

            let csv = "Roll,Name,Class,Subject,Date,Obtained,Total,Teacher\n";
            filtered.forEach(r => csv += `${r.roll},${r.name},${r.class},${r.subject},${r.date},${r.ob},${r.tot},${r.teacher}\n`);
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `MindWave_Report_${new Date().getTime()}.csv`;
            a.click();
        }

        // PDF EXPORTER
        function downloadPDF(id, name) {
            const element = document.getElementById(id);
            const opt = { margin: 0.5, filename: name+'.pdf', image: { type:'jpeg', quality:0.98 }, html2canvas: { scale:2 }, jsPDF: { unit:'in', format:'letter', orientation:'portrait' } };
            html2pdf().set(opt).from(element).save();
        }

        function renderTask(task) {
            const area = document.getElementById('task-display-area');
            if(task === 'manage-results') {
                area.innerHTML = `
                    <div class="mb-6 flex flex-col md:flex-row justify-between items-end gap-4">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-2 flex-1 w-full">
                            <div><label class="text-[9px] font-bold opacity-40">DATE</label><input type="date" id="filter-date" onchange="filterResults()" class="form-input"></div>
                            <div><label class="text-[9px] font-bold opacity-40">SUBJECT</label><select id="filter-sub" onchange="filterResults()" class="form-input"><option value="">All Subjects</option>${db_subjects.map(s=>`<option>${s}</option>`).join('')}</select></div>
                            <div><label class="text-[9px] font-bold opacity-40">TEACHER</label><select id="filter-teacher" onchange="filterResults()" class="form-input"><option value="">All Teachers</option>${db_teachers.map(t=>`<option>${t.name}</option>`).join('')}</select></div>
                        </div>
                        <button onclick="downloadCSV()" class="bg-black text-white px-6 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg">Export CSV</button>
                    </div>
                    <div id="results-excel-container"></div>
                `;
                filterResults();
            } else if(task === 'enroll') {
                area.innerHTML = `<div class="max-w-md mx-auto"><h3 class="font-black mb-4 uppercase text-center">Enroll New Student</h3><input id="s-name" placeholder="Full Name" class="form-input mb-3"><input id="s-roll" placeholder="Roll No" class="form-input mb-3"><select id="s-class" class="form-input mb-4"><option>9th</option><option>10th</option><option>11th</option><option>12th</option></select><div class="grid grid-cols-2 gap-2 mb-6">${db_subjects.map(s => `<label class="text-xs font-bold"><input type="checkbox" name="s-subs" value="${s}"> ${s}</label>`).join('')}</div><button onclick="saveStudent()" class="w-full btn-purple p-4 rounded-xl">SAVE STUDENT</button></div>`;
            } else if(task === 'teacher') {
                area.innerHTML = `<div class="max-w-md mx-auto"><h3 class="font-black mb-4 uppercase text-center">Register Teacher</h3><input id="t-name" placeholder="Name" class="form-input mb-3"><input id="t-pass" type="password" placeholder="Pass" class="form-input mb-3"><select id="t-class" class="form-input mb-3"><option>9th</option><option>10th</option><option>11th</option><option>12th</option></select><select id="t-sub" class="form-input mb-4">${db_subjects.map(s => `<option>${s}</option>`).join('')}</select><button onclick="saveTeacher()" class="w-full btn-purple p-4 rounded-xl uppercase">Register</button></div>`;
            } else if(task === 'directory') {
                area.innerHTML = db_students.map((s,i) => `<div class="p-4 border rounded-2xl mb-2 flex justify-between items-center bg-gray-50"><div><b>${s.name}</b> (${s.roll})</div><button onclick="removeItem('student',${i})" class="text-red-500 font-bold">Delete</button></div>`).join('');
            }
        }

        function filterResults() {
            const date = document.getElementById('filter-date').value;
            const sub = document.getElementById('filter-sub').value;
            const teacher = document.getElementById('filter-teacher').value;
            let filtered = db_results;
            if(date) filtered = filtered.filter(r => r.date === date);
            if(sub) filtered = filtered.filter(r => r.subject === sub);
            if(teacher) filtered = filtered.filter(r => r.teacher === teacher);

            const uniqueRolls = [...new Set(filtered.map(r => r.roll))];
            const container = document.getElementById('results-excel-container');

            container.innerHTML = `
                <table class="excel-table shadow-lg rounded-xl overflow-hidden">
                    <thead><tr><th>Roll</th><th>Student Name</th><th>Record Count</th><th>View</th></tr></thead>
                    <tbody>
                        ${uniqueRolls.map(roll => {
                            const sInfo = db_students.find(s => s.roll === roll) || {name: "N/A"};
                            const count = filtered.filter(r => r.roll === roll).length;
                            return `
                                <tr class="row-hover" onclick="showStudentDetail('${roll}')">
                                    <td class="font-bold">${roll}</td>
                                    <td class="font-black text-purple-900">${sInfo.name}</td>
                                    <td>${count} Entry(s)</td>
                                    <td class="text-blue-600 font-bold text-[10px]">OPEN</td>
                                </tr>
                                <tr id="detail-${roll}" class="hidden bg-slate-50"><td colspan="4" id="detail-box-${roll}" class="p-6"></td></tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        function showStudentDetail(roll) {
            const row = document.getElementById(`detail-${roll}`);
            const box = document.getElementById(`detail-box-${roll}`);
            row.classList.toggle('hidden');
            if(row.classList.contains('hidden')) return;

            const res = db_results.filter(r => r.roll === roll);
            const sInfo = db_students.find(s => s.roll === roll);
            let tOb = 0, tTot = 0;

            box.innerHTML = `
                <div id="pdf-box-${roll}" class="bg-white p-8 border-2 border-purple-900 rounded-3xl">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-black text-purple-900">ACADEMIC RECORD: ${sInfo.name}</h2>
                        <button onclick="downloadPDF('pdf-box-${roll}', 'Record_${roll}')" class="bg-red-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Save PDF</button>
                    </div>
                    <table class="excel-table">
                        <thead><tr><th>Date</th><th>Subject</th><th>Score</th><th>Teacher</th></tr></thead>
                        <tbody>
                            ${res.map(r => {
                                tOb += parseInt(r.ob); tTot += parseInt(r.tot);
                                return `<tr><td>${r.date}</td><td>${r.subject}</td><td class="font-bold">${r.ob}/${r.tot}</td><td class="text-[10px]">${r.teacher}</td></tr>`;
                            }).join('')}
                        </tbody>
                        <tfoot class="bg-purple-900 text-white font-bold">
                            <tr><td colspan="2">OVERALL PERFORMANCE</td><td>${tOb}/${tTot}</td><td>${((tOb/tTot)*100).toFixed(1)}%</td></tr>
                        </tfoot>
                    </table>
                </div>
            `;
        }

        // TEACHER LOGIC
        function loadBulkList() {
            const matrix = document.getElementById('teacher-matrix').value;
            const date = document.getElementById('test-date').value;
            if(!matrix || !date) return;
            const [cls, sub] = matrix.split('|');
            const list = db_students.filter(s => s.class === cls && s.subjects.includes(sub));
            document.getElementById('bulk-student-body').innerHTML = list.map(s => `
                <tr class="border-b"><td>${s.roll}</td><td class="font-bold">${s.name}</td><td><input type="number" class="bulk-mark-input form-input py-1 text-center w-24" data-roll="${s.roll}" data-name="${s.name}" oninput="isDataModified=true"></td></tr>
            `).join('');
            document.getElementById('bulk-empty-msg').classList.add('hidden');
        }

        async function commitBulkResults() {
            const matrix = document.getElementById('teacher-matrix').value;
            const date = document.getElementById('test-date').value;
            const total = document.getElementById('marks-tot').value;
            const inputs = document.querySelectorAll('.bulk-mark-input');
            const [cls, sub] = matrix.split('|');
            inputs.forEach(input => {
                if(input.value !== "") {
                    db_results.push({ roll: input.dataset.roll, name: input.dataset.name, class: cls, subject: sub, ob: input.value, tot: total, date: date, teacher: sessionUser.name });
                }
            });
            await saveAll();
            alert("Database Updated Successfully!");
            loadBulkList();
        }

        // HELPERS
        async function saveStudent() {
            const n = document.getElementById('s-name').value, r = document.getElementById('s-roll').value, c = document.getElementById('s-class').value;
            const subs = Array.from(document.querySelectorAll('input[name="s-subs"]:checked')).map(el => el.value);
            if(n && r) { db_students.push({name:n, roll:r, class:c, subjects: subs}); await saveAll(); renderTask('enroll'); }
        }
        async function saveTeacher() {
            const n = document.getElementById('t-name').value, p = document.getElementById('t-pass').value, c = document.getElementById('t-class').value, s = document.getElementById('t-sub').value;
            if(n && p) { db_teachers.push({name:n, pass:p, auth:[{class:c, subject:s}]}); await saveAll(); alert("Teacher Added"); }
        }
        async function removeItem(t, i) { if(confirm("Confirm Delete?")){ if(t==='student') db_students.splice(i,1); else db_teachers.splice(i,1); await saveAll(); pullAll(); } }

        function getStudentResults() {
            const roll = document.getElementById('query-roll').value, cls = document.getElementById('query-class').value;
            const student = db_students.find(s => s.roll === roll && s.class === cls);
            if(!student) return alert("Student not found in this class.");
            const res = db_results.filter(r => r.roll === roll);
            document.getElementById('result-timeline').innerHTML = `
                <div id="student-report-print">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-black text-purple-900 uppercase">Your Marksheet</h3>
                        <button onclick="downloadPDF('student-report-print', 'Marksheet_${roll}')" class="bg-red-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Download PDF</button>
                    </div>
                    <div class="bg-white border-4 border-purple-900 p-8 rounded-3xl">
                        <h2 class="text-2xl font-black">${student.name}</h2>
                        <p class="font-bold opacity-60 mb-6">Roll: ${student.roll} | Class: ${student.class}</p>
                        <table class="excel-table">
                            <thead><tr><th>Date</th><th>Subject</th><th>Score</th></tr></thead>
                            <tbody>${res.map(r => `<tr><td>${r.date}</td><td class="font-bold">${r.subject}</td><td class="font-black">${r.ob}/${r.tot}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function logout() { if(isDataModified && !confirm("Changes not saved. Logout?")) return; sessionUser = null; isDataModified=false; refreshUI(); }
        
        // INITIAL LOAD
        pullAll();
    </script>
</body>
</html>
