<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="qDC3QO5ITs7CBxmSydNn4KOpa84Bg5q4LruWcHpu20I" />
    <meta name="description" content="Official Mind-Wave Academy portal. Secure login for teachers to manage results and students to view academic progress.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <title>Mind-Wave Academy | Secure Authority Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-purple: #582C83; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfbff; min-height: 100vh; color: #1a1a1a; }
        .glass-panel { background: white; border: 1px solid #e2d9f3; box-shadow: 0 10px 30px rgba(88, 44, 131, 0.05); }
        .brand-gradient { background: linear-gradient(135deg, var(--brand-purple) 0%, #3b0a7d 100%); }
        .btn-purple { background: var(--brand-purple); color: white; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .btn-purple:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-purple:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #e2d9f3; outline: none; font-size: 13px; font-weight: 600; }
        .form-input:disabled { background: #f3f4f6; color: #9ca3af; cursor: not-allowed; border-style: dashed; }
        
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .mind-logo-spin { width: 60px; height: 60px; border: 6px solid #f3f3f3; border-top: 6px solid var(--brand-purple); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .excel-table { width: 100%; border-collapse: collapse; font-size: 13px; background: white; }
        .excel-table th { background: #f8f6ff; color: #582C83; padding: 12px; border: 1px solid #e2d9f3; text-align: left; text-transform: uppercase; font-size: 11px; font-weight: 800; }
        .excel-table td { padding: 12px; border: 1px solid #e2d9f3; }
        .status-absent { color: #ef4444; font-weight: 800; }
        .locked-badge { background: #fee2e2; color: #b91c1c; padding: 2px 8px; border-radius: 5px; font-size: 9px; font-weight: 800; }
    </style>
</head>
<body class="pb-20">

    <div id="loader">
        <div class="mind-logo-spin"></div>
        <p class="mt-4 font-black text-purple-900 text-xs tracking-widest uppercase">Syncing Mind-Wave Data...</p>
    </div>

    <nav class="brand-gradient text-white p-6 flex flex-col items-center mb-8 shadow-xl">
        <h1 class="text-2xl font-black uppercase italic tracking-tighter">Mind-Wave Academy</h1>
        <p class="text-[10px] tracking-[3px] opacity-80 uppercase">Authority Control System</p>
    </nav>

    <div class="container mx-auto px-4 max-w-6xl">
        <div class="flex flex-wrap justify-between items-center mb-8 gap-4">
            <div class="glass-panel p-1.5 rounded-2xl flex gap-1 shadow-sm">
                <button onclick="switchTab('student')" class="px-6 py-2 rounded-xl font-bold text-xs">Student Portal</button>
                <button onclick="loginAs('teacher')" class="px-6 py-2 rounded-xl font-bold text-xs">Teacher Login</button>
                <button onclick="loginAs('admin')" class="px-6 py-2 btn-purple rounded-xl font-bold text-xs shadow-lg">Super Admin</button>
            </div>
            <button onclick="pullAll()" class="bg-emerald-500 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-md hover:bg-emerald-600 transition">Upgrade Data</button>
        </div>

        <div id="admin-view" class="hidden">
            <div class="glass-panel p-8 rounded-[2.5rem] border-b-[8px] border-purple-900 shadow-2xl">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black text-purple-900 uppercase">Super Admin Hub</h2>
                    <button onclick="logout()" class="text-red-500 text-xs font-bold uppercase">Logout</button>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-8">
                    <button onclick="renderTask('enroll')" class="p-4 bg-white border-2 rounded-2xl font-black text-[9px] uppercase hover:border-purple-900 transition">Enroll Student</button>
                    <button onclick="renderTask('teacher')" class="p-4 bg-white border-2 rounded-2xl font-black text-[9px] uppercase hover:border-purple-900 transition">Add Teacher</button>
                    <button onclick="renderTask('subjects')" class="p-4 bg-purple-900 text-white rounded-2xl font-black text-[9px] uppercase shadow-lg">Subjects</button>
                    <button onclick="renderTask('directory')" class="p-4 bg-purple-50 rounded-2xl font-black text-[9px] uppercase text-purple-900">Student Reg</button>
                    <button onclick="renderTask('teacher-reg')" class="p-4 bg-purple-50 rounded-2xl font-black text-[9px] uppercase text-purple-900">Teacher Reg</button>
                    <button onclick="renderTask('manage-results')" class="p-4 bg-purple-100 rounded-2xl font-black text-[9px] uppercase text-purple-900 border border-purple-200">Manage Results</button>
                </div>
                <div id="task-display-area" class="p-6 bg-white rounded-3xl border border-purple-100 min-h-[400px]"></div>
            </div>
        </div>

        <div id="teacher-view" class="hidden">
            <div class="grid lg:grid-cols-4 gap-6">
                <div class="lg:col-span-1 space-y-4">
                    <div class="glass-panel p-6 rounded-[2rem] border-t-4 border-purple-900">
                        <h2 class="text-sm font-black text-purple-900 mb-4 uppercase text-center">Data Entry</h2>
                        <div class="space-y-3">
                            <select id="teacher-matrix" onchange="loadBulkList()" class="form-input"></select>
                            <input type="date" id="test-date" onchange="loadBulkList()" class="form-input">
                            <input type="number" id="marks-tot" value="100" class="form-input" placeholder="Total Marks">
                        </div>
                        <div id="lock-warning" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-[10px] text-red-700 font-bold text-center">
                            ⚠️ RESULTS ALREADY UPLOADED FOR THIS DATE. ONLY ADMIN CAN CHANGE THEM.
                        </div>
                    </div>
                    <button id="save-btn" onclick="commitBulkResults()" class="w-full btn-purple py-4 rounded-xl text-xs shadow-lg uppercase tracking-widest">Save & Upload</button>
                </div>
                <div class="lg:col-span-3">
                    <div class="glass-panel p-8 rounded-[2.5rem]">
                        <table class="excel-table">
                            <thead><tr><th>Roll No</th><th>Student Name</th><th>Marks / Status</th></tr></thead>
                            <tbody id="bulk-student-body"></tbody>
                        </table>
                        <div id="bulk-empty-msg" class="py-20 text-center text-gray-400 font-bold italic">Select Class & Date to view list</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="student-view" class="max-w-2xl mx-auto">
            <div class="glass-panel p-10 rounded-[3rem] border-t-[12px] border-purple-900">
                <h2 class="text-3xl font-black text-center text-purple-900 mb-8 uppercase">Student Result Portal</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="query-roll" placeholder="Roll No" class="form-input text-center py-4 text-lg">
                        <select id="query-class" class="form-input text-center"><option>9th</option><option>10th</option><option>11th</option><option>12th</option></select>
                    </div>
                    <select id="query-subject" class="form-input text-center">
                        <option value="">Full Report (Summary)</option>
                    </select>
                    <button onclick="getStudentResults()" class="w-full btn-purple py-5 rounded-2xl text-xl shadow-lg uppercase">View Marksheet</button>
                </div>
                <div id="result-timeline" class="mt-8"></div>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://mind-wave-portal-default-rtdb.firebaseio.com/"; 
        let db_students = [], db_teachers = [], db_results = [], db_subjects = [];
        let sessionUser = null;
        let isDataModified = false;

        function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
        window.onbeforeunload = function() { if(isDataModified) return "Unsaved marks will be lost!"; };

        async function cloudSync(path, data = null, method = 'GET') {
            const url = `${FIREBASE_URL}/${path}.json`;
            try {
                const options = method === 'PUT' ? { method: 'PUT', body: JSON.stringify(data) } : {};
                const res = await fetch(url, options);
                return method === 'GET' ? (await res.json() || []) : true;
            } catch (e) { return []; }
        }

        async function pullAll() {
            showLoader(true);
            db_students = await cloudSync('mw_students') || [];
            db_teachers = await cloudSync('mw_teachers') || [];
            db_results = await cloudSync('mw_results') || [];
            db_subjects = await cloudSync('mw_subjects') || [];
            if(db_subjects.length === 0) db_subjects = ["Physics", "Chemistry", "Math", "English"];
            
            const subFilter = document.getElementById('query-subject');
            if(subFilter) subFilter.innerHTML = '<option value="">Full Report (Summary)</option>' + db_subjects.map(s => `<option value="${s}">${s}</option>`).join('');
            
            refreshUI();
            showLoader(false);
        }

        async function saveAll() {
            showLoader(true);
            await cloudSync('mw_students', db_students, 'PUT');
            await cloudSync('mw_teachers', db_teachers, 'PUT');
            await cloudSync('mw_results', db_results, 'PUT');
            await cloudSync('mw_subjects', db_subjects, 'PUT');
            isDataModified = false;
            showLoader(false);
        }

        function switchTab(t) { sessionUser = null; refreshUI(); }
        function loginAs(role) {
            if(role === 'admin') { if(prompt("Admin Key:") === "admin123") { sessionUser = {type:'admin'}; refreshUI(); } }
            else {
                const n = prompt("Name:"), p = prompt("Pass:");
                const user = db_teachers.find(t => t.name === n && t.pass === p);
                if(user) { sessionUser = {type:'teacher', ...user}; refreshUI(); }
            }
        }

        function refreshUI() {
            document.querySelectorAll('#admin-view, #teacher-view, #student-view').forEach(v => v.classList.add('hidden'));
            if(sessionUser?.type === 'admin') document.getElementById('admin-view').classList.remove('hidden');
            else if(sessionUser?.type === 'teacher') {
                document.getElementById('teacher-view').classList.remove('hidden');
                document.getElementById('teacher-matrix').innerHTML = sessionUser.auth.map(a => `<option value="${a.class}|${a.subject}">${a.class} - ${a.subject}</option>`).join('');
            } else document.getElementById('student-view').classList.remove('hidden');
        }

        function renderTask(task) {
            const area = document.getElementById('task-display-area');
            if(task === 'manage-results') {
                area.innerHTML = `
                    <div class="mb-6 grid grid-cols-2 md:grid-cols-5 gap-2 items-end">
                        <div><label class="text-[9px] font-bold opacity-40">DATE</label><input type="date" id="filter-date" onchange="filterResults()" class="form-input"></div>
                        <div><label class="text-[9px] font-bold opacity-40">CLASS</label><select id="filter-class" onchange="filterResults()" class="form-input"><option value="">All Classes</option><option>9th</option><option>10th</option><option>11th</option><option>12th</option></select></div>
                        <div><label class="text-[9px] font-bold opacity-40">SUBJECT</label><select id="filter-sub" onchange="filterResults()" class="form-input"><option value="">All Subjects</option>${db_subjects.map(s=>`<option>${s}</option>`).join('')}</select></div>
                        <div><label class="text-[9px] font-bold opacity-40">TEACHER</label><select id="filter-teacher" onchange="filterResults()" class="form-input"><option value="">All Teachers</option>${db_teachers.map(t=>`<option>${t.name}</option>`).join('')}</select></div>
                        <button onclick="downloadCSV()" class="bg-black text-white p-2.5 rounded-xl text-[9px] font-black uppercase shadow-lg">Export CSV</button>
                    </div>
                    <div id="results-excel-container"></div>
                `;
                filterResults();
            } else if(task === 'enroll') {
                area.innerHTML = `<div class="max-w-md mx-auto"><h3 class="font-black mb-4 uppercase text-center">Enroll Student</h3><input id="s-name" placeholder="Full Name" class="form-input mb-3"><input id="s-roll" placeholder="Roll" class="form-input mb-3"><select id="s-class" class="form-input mb-4"><option>9th</option><option>10th</option><option>11th</option><option>12th</option></select><div class="grid grid-cols-2 gap-2 mb-6">${db_subjects.map(s => `<label class="text-xs font-bold"><input type="checkbox" name="s-subs" value="${s}"> ${s}</label>`).join('')}</div><button onclick="saveStudent()" class="w-full btn-purple p-4 rounded-xl">SAVE</button></div>`;
            } else if(task === 'teacher') {
                area.innerHTML = `<div class="max-w-md mx-auto"><h3 class="font-black mb-4 uppercase text-center">Register Teacher</h3><input id="t-name" placeholder="Name" class="form-input mb-3"><input id="t-pass" type="password" placeholder="Pass" class="form-input mb-3"><select id="t-class" class="form-input mb-3"><option>9th</option><option>10th</option><option>11th</option><option>12th</option></select><select id="t-sub" class="form-input mb-4">${db_subjects.map(s => `<option>${s}</option>`).join('')}</select><button onclick="saveTeacher()" class="w-full btn-purple p-4 rounded-xl">ADD</button></div>`;
            } else if(task === 'directory') {
                area.innerHTML = db_students.map((s,i) => `<div class="p-4 border rounded-2xl mb-2 flex justify-between items-center bg-gray-50"><div><b>${s.name}</b> (${s.roll})</div><button onclick="removeItem('student',${i})" class="text-red-500 font-bold uppercase text-[10px]">Delete</button></div>`).join('');
            } else if(task === 'teacher-reg') {
                area.innerHTML = `<h3 class="font-black mb-6 uppercase text-purple-900">Manage Teacher Credentials</h3>` + 
                db_teachers.map((t,i) => `
                    <div class="p-5 border-2 border-purple-50 rounded-2xl mb-3 flex flex-wrap justify-between items-center bg-white shadow-sm">
                        <div>
                            <p class="font-black text-purple-900">${t.name}</p>
                            <p class="text-[10px] opacity-50 font-bold">PASS: ${t.pass}</p>
                            <p class="text-[9px] bg-purple-100 px-2 py-0.5 rounded-full inline-block mt-1 uppercase font-black">${t.auth[0].class} - ${t.auth[0].subject}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="changeTeacherPass(${i})" class="bg-blue-500 text-white px-3 py-1.5 rounded-lg text-[9px] font-black uppercase">Change Pass</button>
                            <button onclick="removeItem('teacher',${i})" class="bg-red-500 text-white px-3 py-1.5 rounded-lg text-[9px] font-black uppercase">Remove</button>
                        </div>
                    </div>
                `).join('');
            }
            else if(task === 'datesheet') {

    // Group By Week
    const grouped = {};
    db.datesheet.forEach((d, i) => {
        const key = d.week ? d.week : 'Uncategorized';
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push({ ...d, index: i });
    });

    area.innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-8 bg-gray-50 p-6 rounded-3xl">
        <input type="date" id="ds-date" class="form-input">
        <select id="ds-class" class="form-input">
            <option>11th</option>
            <option>12th</option>
            <option>9th</option>
            <option>10th</option>
        </select>
        <select id="ds-sub" class="form-input">
            ${db.subs.map(s => `<option>${s}</option>`).join('')}
        </select>
        <input type="text" id="ds-week" placeholder="Week # / FLP / 2nd Half" class="form-input">
        <input type="text" id="ds-syl" placeholder="Syllabus" class="form-input">
        <button onclick="saveToDatesheet()" class="btn-purple md:col-span-5 p-3 mt-2">
            ADD TO ACADEMIC CALENDAR
        </button>
    </div>

    <div class="space-y-4">
        ${Object.keys(grouped).map(week => `
            <div class="border rounded-2xl overflow-hidden shadow-sm">
                <button onclick="toggleWeek('${week}')" 
                        class="w-full text-left p-5 bg-purple-900 text-white font-black uppercase tracking-wider">
                    Week ${week}
                </button>

                <div id="week-${week}" class="hidden bg-white p-4">
                    <table class="excel-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Class</th>
                                <th>Subject</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${grouped[week].map(d => `
                                <tr>
                                    <td>${d.date}</td>
                                    <td>${d.class}</td>
                                    <td>${d.subject}</td>
                                    <td>
                                        <button onclick="deleteDS(${d.index})"
                                            class="text-red-500 font-bold">
                                            ✕
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `).join('')}
    </div>
    `;
}
        }

        async function changeTeacherPass(idx) {
            const newPass = prompt("Enter New Password for " + db_teachers[idx].name + ":");
            if(newPass) {
                db_teachers[idx].pass = newPass;
                await saveAll();
                renderTask('teacher-reg');
            }
        }

        function filterResults() {
            const date = document.getElementById('filter-date').value, cls = document.getElementById('filter-class').value, sub = document.getElementById('filter-sub').value, tchr = document.getElementById('filter-teacher').value;
            let filtered = db_results;
            if(date) filtered = filtered.filter(r => r.date === date);
            if(cls) filtered = filtered.filter(r => r.class === cls);
            if(sub) filtered = filtered.filter(r => r.subject === sub);
            if(tchr) filtered = filtered.filter(r => r.teacher === tchr);
            const uniqueRolls = [...new Set(filtered.map(r => r.roll))];
            const container = document.getElementById('results-excel-container');
            container.innerHTML = `<table class="excel-table shadow-lg rounded-xl overflow-hidden"><thead><tr><th>Roll</th><th>Student Name</th><th>Class</th><th>Entries</th><th>Action</th></tr></thead><tbody>
                ${uniqueRolls.map(roll => {
                    const sInfo = db_students.find(s => s.roll === roll) || {name: "N/A", class: "N/A"};
                    const count = filtered.filter(r => r.roll === roll).length;
                    return `<tr class="row-hover" onclick="showStudentDetail('${roll}')"><td>${roll}</td><td class="font-black text-purple-900">${sInfo.name}</td><td>${sInfo.class}</td><td>${count} Tests</td><td class="text-blue-600 font-bold text-[10px]">OPEN</td></tr><tr id="detail-${roll}" class="hidden bg-slate-50"><td colspan="5" id="detail-box-${roll}" class="p-6"></td></tr>`;
                }).join('')}</tbody></table>`;
        }

        function showStudentDetail(roll) {
            const row = document.getElementById(`detail-${roll}`);
            const box = document.getElementById(`detail-box-${roll}`);
            row.classList.toggle('hidden');
            if(row.classList.contains('hidden')) return;
            const res = db_results.filter(r => r.roll === roll);
            box.innerHTML = `<div id="pdf-box-${roll}" class="bg-white p-6 border-2 border-purple-900 rounded-3xl"><table class="excel-table"><thead><tr><th>Date</th><th>Subject</th><th>Score</th><th>Delete</th></tr></thead><tbody>
                ${res.map((r) => `<tr><td>${r.date}</td><td class="font-bold">${r.subject}</td><td class="${r.ob==='A'?'status-absent':''}">${r.ob==='A'?'ABSENT':r.ob+'/'+r.tot}</td><td><button onclick="deleteResultEntry('${roll}', '${r.date}', '${r.subject}')" class="text-red-500 font-black">✕</button></td></tr>`).join('')}
                </tbody></table></div>`;
        }

        async function deleteResultEntry(roll, date, sub) {
            if(!confirm("Admin: Permanent Delete?")) return;
            const idx = db_results.findIndex(r => r.roll === roll && r.date === date && r.subject === sub);
            if(idx > -1) { db_results.splice(idx, 1); await saveAll(); filterResults(); }
        }

        function getStudentResults() {
            const roll = document.getElementById('query-roll').value, cls = document.getElementById('query-class').value, selectedSub = document.getElementById('query-subject').value;
            const student = db_students.find(s => s.roll === roll && s.class === cls);
            if(!student) return alert("Student not found.");
            const res = db_results.filter(r => r.roll === roll);
            let html = `<div id="report-card" class="bg-white border-4 border-purple-900 p-8 rounded-[2.5rem] shadow-2xl">
                <div class="flex justify-between items-start mb-6"><div><h2 class="text-2xl font-black text-purple-900 uppercase">${student.name}</h2><p class="font-bold text-gray-400">Roll: ${student.roll} | Class: ${student.class}</p></div><button onclick="downloadPDF('report-card', 'Marksheet_${roll}')" class="bg-red-500 text-white px-4 py-2 rounded-xl text-[10px] font-black">PDF</button></div>`;
            if(selectedSub) {
                const subResults = res.filter(r => r.subject === selectedSub);
                let sOb = 0, sTot = 0;
                html += `<h3 class="bg-purple-900 text-white p-3 rounded-xl font-black text-center mb-4 uppercase">${selectedSub} Progress</h3><table class="excel-table"><thead><tr><th>Date</th><th>Obtained</th><th>Total</th></tr></thead><tbody>
                    ${subResults.map(r => {
                        let m = r.ob === 'A' ? 0 : parseInt(r.ob); sOb += m; sTot += parseInt(r.tot);
                        return `<tr><td>${r.date}</td><td class="${r.ob==='A'?'status-absent':''} font-bold">${r.ob==='A'?'ABSENT':r.ob}</td><td>${r.tot}</td></tr>`;
                    }).join('')}</tbody><tfoot class="bg-purple-100 font-black"><tr><td>SUBTOTAL</td><td>${sOb}</td><td>${sTot}</td></tr></tfoot></table>`;
            } else {
                let gOb = 0, gTot = 0;
                html += `<h3 class="bg-purple-900 text-white p-3 rounded-xl font-black text-center mb-4 uppercase">Overall Summary</h3><table class="excel-table mb-6"><thead><tr><th>Subject</th><th>Obtained</th><th>Total</th></tr></thead><tbody>`;
                db_subjects.forEach(s => {
                    const subRes = res.filter(r => r.subject === s);
                    if(subRes.length > 0) {
                        let sOb = subRes.reduce((a, b) => a + (b.ob==='A'?0:parseInt(b.ob)), 0), sTot = subRes.reduce((a, b) => a + parseInt(b.tot), 0);
                        gOb += sOb; gTot += sTot;
                        html += `<tr><td class="font-bold">${s}</td><td>${sOb}</td><td>${sTot}</td></tr>`;
                    }
                });
                html += `</tbody><tfoot class="bg-purple-900 text-white font-black"><tr><td>GRAND TOTAL</td><td>${gOb}</td><td>${gTot}</td></tr></tfoot></table><div class="bg-purple-50 p-6 rounded-2xl flex justify-between items-center"><span class="font-black text-purple-900">FINAL PERCENTAGE</span><span class="text-3xl font-black">${((gOb/gTot)*100 || 0).toFixed(1)}%</span></div>`;
            }
            html += `</div>`;
            document.getElementById('result-timeline').innerHTML = html;
        }

        function loadBulkList() {
            const matrix = document.getElementById('teacher-matrix').value;
            const date = document.getElementById('test-date').value;
            const warning = document.getElementById('lock-warning');
            const saveBtn = document.getElementById('save-btn');
            if(!matrix || !date) return;
            const [cls, sub] = matrix.split('|');
            const existing = db_results.filter(r => r.class === cls && r.subject === sub && r.date === date);
            const isLocked = existing.length > 0;
            warning.classList.toggle('hidden', !isLocked);
            saveBtn.disabled = isLocked;
            const list = db_students.filter(s => s.class === cls && s.subjects.includes(sub));
            document.getElementById('bulk-student-body').innerHTML = list.map(s => {
                const prev = existing.find(r => r.roll === s.roll);
                const val = prev ? (prev.ob === 'A' ? 'A' : prev.ob) : "";
                return `<tr class="border-b">
                    <td>${s.roll}</td>
                    <td class="font-bold">${s.name} ${isLocked ? '<span class="locked-badge">LOCKED</span>' : ''}</td>
                    <td>
                        <input type="text" class="bulk-mark-input form-input w-24 text-center" 
                               data-roll="${s.roll}" data-name="${s.name}" 
                               value="${val}" ${isLocked ? 'disabled' : ''} 
                               oninput="isDataModified=true" placeholder="Marks/A">
                    </td>
                </tr>`;
            }).join('');
            document.getElementById('bulk-empty-msg').classList.add('hidden');
        }

        async function commitBulkResults() {
            const matrix = document.getElementById('teacher-matrix').value, date = document.getElementById('test-date').value, total = document.getElementById('marks-tot').value;
            const [cls, sub] = matrix.split('|');
            const inputs = document.querySelectorAll('.bulk-mark-input');
            inputs.forEach(input => {
                let val = input.value.trim().toUpperCase();
                if(val !== "") db_results.push({ roll: input.dataset.roll, name: input.dataset.name, class: cls, subject: sub, ob: val, tot: total, date: date, teacher: sessionUser.name });
            });
            await saveAll();
            alert("Results Locked & Uploaded!");
            loadBulkList();
        }

        async function saveStudent() {
            const n = document.getElementById('s-name').value, r = document.getElementById('s-roll').value, c = document.getElementById('s-class').value;
            const subs = Array.from(document.querySelectorAll('input[name="s-subs"]:checked')).map(el => el.value);
            if(n && r) { db_students.push({name:n, roll:r, class:c, subjects: subs}); await saveAll(); renderTask('enroll'); }
        }
        async function saveTeacher() {
            const n = document.getElementById('t-name').value, p = document.getElementById('t-pass').value, c = document.getElementById('t-class').value, s = document.getElementById('t-sub').value;
            if(n && p) { db_teachers.push({name:n, pass:p, auth:[{class:c, subject:s}]}); await saveAll(); alert("Teacher Added Successfully"); renderTask('teacher'); }
        }
        async function removeItem(type, idx) { 
            if(confirm("Confirm deletion?")) { 
                if(type==='student') db_students.splice(idx,1); 
                else if(type==='teacher') db_teachers.splice(idx,1);
                await saveAll(); 
                pullAll(); 
            } 
        }
        function downloadCSV() {
            let csv = "Roll,Name,Class,Subject,Date,Score\n";
            db_results.forEach(r => csv += `${r.roll},${r.name},${r.class},${r.subject},${r.date},${r.ob}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = window.URL.createObjectURL(blob); a.download = 'results.csv'; a.click();
        }
        function downloadPDF(id, name) {
            const opt = { margin: 0.5, filename: name+'.pdf', html2canvas: { scale:2 }, jsPDF: { unit:'in', format:'letter', orientation:'portrait' } };
            html2pdf().set(opt).from(document.getElementById(id)).save();
        }
        function logout() { sessionUser = null; refreshUI(); 
        }
        function toggleWeek(week) {
            const el = document.getElementById('week-' + week);
            el.classList.toggle('hidden');
        }
        pullAll();
    </script>
</body>
</html>
